# ============================================================
# application-prod.properties - Modex Monolito (PRODUCCION)
# Se activa en Render con la variable de entorno:
# SPRING_PROFILES_ACTIVE=prod
#
# Todos los valores sensibles vienen de variables de entorno
# configuradas en el dashboard de Render — nunca se escriben
# aqui directamente. Esto es lo que hace seguro subir este
# archivo a GitHub.
# ============================================================

spring.application.name=modex-monolith

# Render asigna el puerto via la variable PORT automaticamente
server.port=${PORT:8080}

# ── MongoDB Atlas ──
# MONGODB_URI debe incluir el nombre de la base al final,
# ej: mongodb+srv://usuario:clave@cluster.mongodb.net/modex_db
spring.data.mongodb.uri=${MONGODB_URI}

# ── PostgreSQL (Render Postgres gratuito) ──
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA ──
# update en vez de validate: la primera vez que arranca en
# Render necesita crear las tablas. Es seguro para este
# proyecto porque no hay datos de produccion reales que
# proteger de cambios de esquema.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ── JWT ──
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:3600000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ── CORS ──
# La URL exacta del frontend en Vercel, ej:
# https://modex-plus.vercel.app
app.cors.allowed-origins=${FRONTEND_URL}

# ── Logging - menos verboso en produccion ──
logging.level.com.modex=INFO
logging.level.org.springframework.security=WARN
logging.level.root=WARN

# ── Actuator - Render usa /actuator/health para el health check ──
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ── Jackson ──
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false
