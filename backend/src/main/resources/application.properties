# ============================================================
# application.properties - Modex Monolito (desarrollo LOCAL)
# Usa las mismas credenciales que el docker-compose.yml
# original para que puedas seguir probando localmente con
# Docker mientras migras.
# ============================================================

spring.application.name=modex-monolith
server.port=8080

# ── MongoDB - una sola base "modex_db" con varias colecciones ──
# (users, refresh_tokens, products)
spring.data.mongodb.uri=mongodb://mongo_user:mongo_pass@localhost:27017/modex_db?authSource=admin
spring.data.mongodb.database=modex_db

# ── PostgreSQL - orders e inventory ──
spring.datasource.url=jdbc:postgresql://localhost:5432/ropa_store
spring.datasource.username=ropa_user
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA ──
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ── JWT ──
jwt.secret=modex-secret-key-super-segura-256-bits-para-hs256-algorithm
jwt.expiration=3600000
jwt.refresh-expiration=604800000

# ── CORS - en local permitimos todo origen ──
app.cors.allowed-origins=*

# ── Logging ──
logging.level.com.modex=DEBUG
logging.level.org.springframework.security=DEBUG

# ── Actuator ──
management.endpoints.web.exposure.include=health,metrics,info
management.endpoint.health.show-details=always

# ── Jackson ──
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false
